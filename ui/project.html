<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager | Project Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="app-body" data-page="projects">
    <div id="toast" class="app-toast d-none"></div>
    <nav id="app-nav"></nav>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="projects.html" class="btn btn-link text-decoration-none px-0">&larr; Back to projects</a>
            <div class="small text-secondary" id="project-meta-line"></div>
        </div>

        <div class="row g-4">
            <div class="col-12 col-xl-4">
                <section class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <h1 id="project-title-display" class="h2 mb-2">Project</h1>
                        <div id="project-status-badge" class="mb-3"></div>
                        <p id="project-description-display" class="text-secondary mb-0">Loading project details...</p>
                    </div>
                </section>

                <section class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <h2 class="h4 mb-3">Update project</h2>
                        <form id="project-update-form" class="vstack gap-3">
                            <div>
                                <label for="edit-project-title" class="form-label">Title</label>
                                <input id="edit-project-title" name="title" class="form-control" type="text" required>
                            </div>
                            <div>
                                <label for="edit-project-description" class="form-label">Description</label>
                                <textarea id="edit-project-description" name="description" class="form-control" rows="4"></textarea>
                            </div>
                            <div>
                                <label for="edit-project-status" class="form-label">Status</label>
                                <select id="edit-project-status" name="status" class="form-select">
                                    <option value="active">active</option>
                                    <option value="on_hold">on_hold</option>
                                    <option value="completed">completed</option>
                                    <option value="archived">archived</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">Save project</button>
                        </form>
                        <button id="delete-project-btn" class="btn btn-outline-danger mt-3 w-100" type="button">Delete project</button>
                    </div>
                </section>

                <section class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="h4 mb-3">Create task</h2>
                        <form id="task-form" class="vstack gap-3">
                            <div>
                                <label for="task-title" class="form-label">Title</label>
                                <input id="task-title" name="title" class="form-control" type="text" required>
                            </div>
                            <div>
                                <label for="task-description" class="form-label">Description</label>
                                <textarea id="task-description" name="description" class="form-control" rows="4"></textarea>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="task-status" class="form-label">Status</label>
                                    <select id="task-status" name="status" class="form-select">
                                        <option value="todo">todo</option>
                                        <option value="in_progress">in_progress</option>
                                        <option value="done">done</option>
                                        <option value="blocked">blocked</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="task-priority" class="form-label">Priority</label>
                                    <select id="task-priority" name="priority" class="form-select">
                                        <option value="low">low</option>
                                        <option value="medium" selected>medium</option>
                                        <option value="high">high</option>
                                        <option value="critical">critical</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="task-due-date" class="form-label">Due date</label>
                                    <input id="task-due-date" name="due_date" class="form-control" type="date">
                                </div>
                                <div class="col-md-6 d-none" id="assignee-field-wrap">
                                    <label for="task-assignee" class="form-label">Assignee</label>
                                    <select id="task-assignee" name="assignee_id" class="form-select"></select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Create task</button>
                        </form>
                    </div>
                </section>
            </div>

            <div class="col-12 col-xl-8">
                <section class="card border-0 shadow-sm h-100">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <h2 class="h4 mb-1">Tasks</h2>
                                <p class="text-secondary mb-0">Inline status updates use the backend's dedicated patch route.</p>
                            </div>
                            <button id="refresh-tasks-btn" class="btn btn-outline-primary" type="button">Refresh tasks</button>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Task</th>
                                        <th>Status</th>
                                        <th>Priority</th>
                                        <th>Due</th>
                                        <th class="text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="task-table-body"></tbody>
                            </table>
                        </div>
                        <div id="task-empty" class="empty-state d-none">This project has no tasks yet.</div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/project.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager | Task Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="app-body" data-page="projects">
    <div id="toast" class="app-toast d-none"></div>
    <nav id="app-nav"></nav>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a id="back-to-project-link" href="projects.html" class="btn btn-link text-decoration-none px-0">&larr; Back</a>
            <button id="delete-task-btn" class="btn btn-outline-danger" type="button">Delete task</button>
        </div>

        <div class="row g-4">
            <div class="col-12 col-xl-5">
                <section class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <p class="text-uppercase small text-primary fw-semibold mb-2 tracking-wide">Task detail</p>
                        <h1 id="task-title-display" class="h2 mb-2">Task</h1>
                        <p id="task-description-display" class="text-secondary mb-3">Loading task details...</p>
                        <div class="d-flex flex-wrap gap-2 mb-3" id="task-badges"></div>
                        <dl class="row mb-0 small">
                            <dt class="col-4 text-secondary">Project</dt>
                            <dd class="col-8" id="task-project-name">-</dd>
                            <dt class="col-4 text-secondary">Assignee</dt>
                            <dd class="col-8" id="task-assignee-display">-</dd>
                            <dt class="col-4 text-secondary">Due date</dt>
                            <dd class="col-8" id="task-due-display">-</dd>
                            <dt class="col-4 text-secondary">Created</dt>
                            <dd class="col-8" id="task-created-display">-</dd>
                        </dl>
                    </div>
                </section>

                <section class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <h2 class="h4 mb-1">Quick status update</h2>
                                <p class="text-secondary mb-0">Uses <code>PATCH /tasks/{id}/status</code>.</p>
                            </div>
                        </div>
                        <form id="task-status-form" class="vstack gap-3">
                            <select id="task-status-select" name="status" class="form-select">
                                <option value="todo">todo</option>
                                <option value="in_progress">in_progress</option>
                                <option value="done">done</option>
                                <option value="blocked">blocked</option>
                            </select>
                            <button type="submit" class="btn btn-primary">Update status</button>
                        </form>
                    </div>
                </section>

                <section class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="h4 mb-3">Edit task</h2>
                        <form id="task-update-form" class="vstack gap-3">
                            <div>
                                <label for="edit-task-title" class="form-label">Title</label>
                                <input id="edit-task-title" name="title" class="form-control" type="text" required>
                            </div>
                            <div>
                                <label for="edit-task-description" class="form-label">Description</label>
                                <textarea id="edit-task-description" name="description" class="form-control" rows="4"></textarea>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="edit-task-priority" class="form-label">Priority</label>
                                    <select id="edit-task-priority" name="priority" class="form-select">
                                        <option value="low">low</option>
                                        <option value="medium">medium</option>
                                        <option value="high">high</option>
                                        <option value="critical">critical</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="edit-task-due-date" class="form-label">Due date</label>
                                    <input id="edit-task-due-date" name="due_date" class="form-control" type="date">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">Save task</button>
                        </form>
                    </div>
                </section>
            </div>

            <div class="col-12 col-xl-7">
                <div class="vstack gap-4">
                    <section class="card border-0 shadow-sm">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div>
                                    <h2 class="h4 mb-1">Tags</h2>
                                    <p class="text-secondary mb-0">Flat API-compatible tag management.</p>
                                </div>
                                <button id="refresh-tags-btn" class="btn btn-outline-primary" type="button">Refresh tags</button>
                            </div>
                            <div id="task-tag-list" class="vstack gap-2 mb-3"></div>
                            <form id="attach-tag-form" class="row g-3 align-items-end">
                                <div class="col-md-8">
                                    <label for="available-tag-select" class="form-label">Quick attach by tag</label>
                                    <select id="available-tag-select" class="form-select"></select>
                                </div>
                                <div class="col-md-4">
                                    <button type="submit" class="btn btn-primary w-100">Attach tag</button>
                                </div>
                            </form>
                        </div>
                    </section>

                    <section class="card border-0 shadow-sm">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div>
                                    <h2 class="h4 mb-1">Comments</h2>
                                    <p class="text-secondary mb-0">Comment cards use the backend's flat response shape.</p>
                                </div>
                                <button id="refresh-comments-btn" class="btn btn-outline-primary" type="button">Refresh comments</button>
                            </div>

                            <form id="comment-form" class="vstack gap-3 mb-4">
                                <div>
                                    <label for="comment-body" class="form-label">New comment</label>
                                    <textarea id="comment-body" name="body" class="form-control" rows="4" required></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary align-self-start">Post comment</button>
                            </form>

                            <div id="comment-list" class="vstack gap-3"></div>
                            <div id="comment-empty" class="empty-state d-none">No comments yet.</div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/task.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="auth-body">
    <div id="toast" class="app-toast d-none"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                <section class="card auth-card shadow-lg border-0">
                    <div class="card-body p-4 p-md-5">
                        <p class="text-uppercase small text-primary fw-semibold mb-2 tracking-wide">Task Manager</p>
                        <h1 class="display-6 fw-bold mb-2">Create your account</h1>
                        <p class="text-secondary mb-4">Your backend already supports registration, so this page talks directly to <code>/auth/register</code>.</p>

                        <form id="register-form" class="vstack gap-3">
                            <div>
                                <label for="register-base-url" class="form-label">Backend URL</label>
                                <input id="register-base-url" name="baseUrl" class="form-control" type="url" placeholder="http://127.0.0.1:8010" required>
                            </div>
                            <div>
                                <label for="register-full-name" class="form-label">Full name</label>
                                <input id="register-full-name" name="full_name" class="form-control" type="text" required>
                            </div>
                            <div>
                                <label for="register-email" class="form-label">Email</label>
                                <input id="register-email" name="email" class="form-control" type="email" required>
                            </div>
                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <label for="register-password" class="form-label">Password</label>
                                    <input id="register-password" name="password" class="form-control" type="password" minlength="6" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="register-confirm-password" class="form-label">Confirm password</label>
                                    <input id="register-confirm-password" name="confirm_password" class="form-control" type="password" minlength="6" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg mt-2">Create account</button>
                        </form>

                        <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                            <span class="text-secondary">Already registered?</span>
                            <a href="index.html" class="btn btn-link text-decoration-none px-0">Back to login</a>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

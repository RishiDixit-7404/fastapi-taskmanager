<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager | Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="auth-body">
    <div id="toast" class="app-toast d-none"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                <section class="card auth-card shadow-lg border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex justify-content-between align-items-start mb-4">
                            <div>
                                <p class="text-uppercase small text-primary fw-semibold mb-2 tracking-wide">Task Manager</p>
                                <h1 class="display-6 fw-bold mb-2">Sign in to your workspace</h1>
                                <p class="text-secondary mb-0">Static frontend, existing FastAPI backend, no backend changes.</p>
                            </div>
                            <span class="badge text-bg-dark rounded-pill px-3 py-2">Level 3 UI</span>
                        </div>

                        <div class="row g-4">
                            <div class="col-12 col-lg-5">
                                <div class="surface-panel h-100">
                                    <h2 class="h6 text-uppercase text-secondary mb-3">Connection</h2>
                                    <form id="settings-form" class="vstack gap-3">
                                        <div>
                                            <label for="base-url" class="form-label">Backend URL</label>
                                            <input id="base-url" name="baseUrl" class="form-control" type="url" placeholder="http://127.0.0.1:8010" required>
                                        </div>
                                        <button type="submit" class="btn btn-outline-primary w-100">Save backend URL</button>
                                    </form>

                                    <div class="mt-4 small text-secondary">
                                        <div class="mb-2"><strong>Storage:</strong> <code>sessionStorage</code></div>
                                        <div><strong>Note:</strong> closing the tab signs you out.</div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12 col-lg-7">
                                <div class="surface-panel h-100">
                                    <h2 class="h5 fw-semibold mb-3">Welcome back</h2>
                                    <form id="login-form" class="vstack gap-3">
                                        <div>
                                            <label for="login-email" class="form-label">Email</label>
                                            <input id="login-email" name="email" class="form-control form-control-lg" type="email" required>
                                        </div>
                                        <div>
                                            <label for="login-password" class="form-label">Password</label>
                                            <input id="login-password" name="password" class="form-control form-control-lg" type="password" required>
                                        </div>
                                        <button type="submit" class="btn btn-primary btn-lg">Login</button>
                                    </form>

                                    <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                                        <span class="text-secondary">New here?</span>
                                        <a href="register.html" class="btn btn-link text-decoration-none px-0">Create an account</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
